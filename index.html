<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Flag Turtle Race</title>


<style>


@font-face{

font-family:ComicCustom;

src:url("comic-sans-ms.ttf");

}


*{

margin:0;

padding:0;

box-sizing:border-box;

user-select:none;

}



body{

width:100vw;

height:100vh;

overflow:hidden;

background:linear-gradient(#25c9ff,#004a99);

font-family:ComicCustom,"Comic Sans MS";

color:white;

}



/* TITLE */


#title{

position:absolute;

top:20px;

width:100%;

text-align:center;

font-size:55px;

color:#ffeb3b;

text-shadow:5px 5px black;

}



/* FLAG */


#flagBox{

position:absolute;

top:120px;

width:100%;

text-align:center;

}



#flag{


width:420px;

height:260px;


object-fit:contain;


background:white;

border:8px solid white;

border-radius:20px;


box-shadow:0 8px 20px black;


}



/* ANIMALS */


.character{

position:absolute;

bottom:22%;

width:220px;

}



#shark{

left:30px;

transform:scaleX(-1);

}



#turtle{

left:430px;

}



/* GO BUTTON */


#go{


position:absolute;

bottom:40px;

left:50%;

transform:translateX(-50%);


font-size:60px;

padding:15px 90px;


background:#ffeb3b;


border-radius:60px;

border:5px solid white;


font-family:inherit;


}




/* MESSAGE */


#message{


display:none;


position:absolute;


top:0;


width:100%;

height:100%;


background:rgba(0,0,0,.75);


justify-content:center;

align-items:center;


font-size:80px;


z-index:50;


}




</style>


</head>


<body>



<div id="title">

Swim Turtle Swim!

</div>




<div id="flagBox">

<img id="flag">

</div>





<img

id="shark"

class="character"

src="shark.gif"

>



<img

id="turtle"

class="character"

src="turtle.gif"

>





<button id="go">

GO!

</button>




<div id="message"></div>






<script>



let flags=[



{

word:"Korea",

img:"Flag_of_South_Korea.svg.webp"

},



{

word:"Italy",

img:"Flag_of_Italy.svg.webp"

},



{

word:"Philippines",

img:"Flag_of_the_Philippines.svg.webp"

},



{

word:"Japan",

img:"Japan Flag.webp"

},



{

word:"USA",

img:"USA.png"

}



];






let currentFlag;



let sharkX=30;

let turtleX=430;



let shark=

document.getElementById("shark");



let turtle=

document.getElementById("turtle");



let flag=

document.getElementById("flag");



let message=

document.getElementById("message");






function chooseFlag(){



currentFlag=

flags[

Math.floor(

Math.random()*flags.length

)

];



flag.src=

currentFlag.img;



}







function reset(){



sharkX=30;

turtleX=430;



shark.style.left=

sharkX+"px";



turtle.style.left=

turtleX+"px";



}







function win(){



message.innerHTML=

"GOOD JOB!";



message.style.display=

"flex";



setTimeout(()=>{



message.style.display=

"none";


// NEW FLAG AFTER SUCCESS


chooseFlag();



reset();



},2000);



}








function lose(){



message.innerHTML=

"TRY AGAIN!";



message.style.display=

"flex";



setTimeout(()=>{



message.style.display=

"none";



// SAME FLAG AGAIN


reset();



},2000);



}









function chase(){



sharkX+=0.6;



shark.style.left=

sharkX+"px";



let s=

shark.getBoundingClientRect();



let t=

turtle.getBoundingClientRect();




if(

s.right>

t.left+60

){



lose();



}




requestAnimationFrame(chase);



}








document.getElementById("go")

.onclick=function(){



turtleX+=90;



turtle.style.left=

turtleX+"px";





if(

turtleX>

window.innerWidth-260

){



win();



}



};







chooseFlag();


chase();



</script>




</body>


</html>
